name: Deploy to WordPress.com

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PLUGIN_SLUG: vicinity-plugin
  THEME_SLUG:  vicinity-theme
  WPCOM_SITE:  ${{ secrets.WPCOM_SITE_SLUG }}

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check syntax — plugin
        run: |
          ERRORS=0
          while IFS= read -r file; do
            if ! OUT=$(php -l "$file" 2>&1); then
              echo "$OUT"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find plugins/${{ env.PLUGIN_SLUG }} -name "*.php")
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS PHP syntax error(s) found in plugin"
            exit 1
          fi
          echo "Plugin: all PHP files OK"

      - name: Check syntax — theme
        run: |
          ERRORS=0
          while IFS= read -r file; do
            if ! OUT=$(php -l "$file" 2>&1); then
              echo "$OUT"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find themes/${{ env.THEME_SLUG }} -name "*.php")
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS PHP syntax error(s) found in theme"
            exit 1
          fi
          echo "Theme: all PHP files OK"

  # ── 2. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      plugin_ver: ${{ steps.plugin_ver.outputs.version }}
      theme_ver:  ${{ steps.theme_ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read plugin version
        id: plugin_ver
        run: |
          VER=$(grep -oP "define\(\s*'VICINITY_VERSION',\s*'\K[0-9]+\.[0-9]+\.[0-9]+" \
                plugins/${{ env.PLUGIN_SLUG }}/vicinity-plugin.php || echo "0.0.0")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Plugin version: $VER"

      - name: Read theme version
        id: theme_ver
        run: |
          VER=$(grep -oP "^Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+" \
                themes/${{ env.THEME_SLUG }}/style.css || echo "0.0.0")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Theme version: $VER"

      # Stage for WordPress.com — artifact must be named "wpcom"
      # WP.com Advanced mode unpacks this into wp-content/
      - name: Stage wpcom artifact
        run: |
          mkdir -p wpcom/plugins wpcom/themes
          cp -r plugins/${{ env.PLUGIN_SLUG }} wpcom/plugins/
          cp -r themes/${{ env.THEME_SLUG }}   wpcom/themes/

      - name: Upload wpcom artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpcom
          path: wpcom/
          retention-days: 7

      # Versioned ZIPs for manual installs and GitHub Releases
      - name: Zip plugin
        run: |
          cd plugins
          zip -r ../vicinity-plugin-v${{ steps.plugin_ver.outputs.version }}.zip \
            ${{ env.PLUGIN_SLUG }}/ -x "*.DS_Store" "*.git*"

      - name: Zip theme
        run: |
          cd themes
          zip -r ../vicinity-theme-v${{ steps.theme_ver.outputs.version }}.zip \
            ${{ env.THEME_SLUG }}/ -x "*.DS_Store" "*.git*"

      - name: Upload versioned ZIPs
        uses: actions/upload-artifact@v4
        with:
          name: vicinity-packages-v${{ steps.plugin_ver.outputs.version }}
          path: |
            vicinity-plugin-v*.zip
            vicinity-theme-v*.zip
          retention-days: 30

  # ── 3. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Trigger WP.com Deployment
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Trigger WordPress.com deployment
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.WPCOM_OAUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://public-api.wordpress.com/wpcom/v2/sites/${{ env.WPCOM_SITE }}/hosting/github-deployments/deploy" \
            -d '{"ref":"main"}' \
            | tee /tmp/deploy_response.json
          STATUS=$(python3 -c "import sys,json; d=json.load(open('/tmp/deploy_response.json')); print(d.get('status','unknown'))" 2>/dev/null || echo "sent")
          echo "Deploy status: $STATUS"

  # ── 4. Release (on version tag) ────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download versioned ZIPs
        uses: actions/download-artifact@v4
        with:
          name: vicinity-packages-v${{ needs.build.outputs.plugin_ver }}
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vicinity-plugin-v*.zip
            vicinity-theme-v*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
